# ===========================================
# K-MATE Frontend Docker Compose
# ===========================================

version: '3.8'

services:
  # ===========================================
  # Frontend
  # ===========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kmate-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - kmate-network

# ===========================================
# Networks
# ===========================================
networks:
  kmate-network:
    name: kmate-network
    driver: bridge
    external: true
